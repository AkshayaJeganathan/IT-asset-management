<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Raise Maintenance Request | IT Asset Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
        .navbar { background: #1a237e; color: white; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .navbar .brand { font-size: 1.2rem; font-weight: 700; text-decoration: none; color: white; }
        .navbar nav a { color: rgba(255,255,255,0.85); text-decoration: none; margin-left: 20px; font-size: 0.9rem; padding: 6px 12px; border-radius: 4px; }
        .navbar nav a:hover { background: rgba(255,255,255,0.15); color: white; }
        .page-wrapper { max-width: 650px; margin: 30px auto; padding: 0 20px; }
        .page-header { margin-bottom: 24px; }
        .page-header h1 { font-size: 1.6rem; color: #b71c1c; font-weight: 700; }
        .card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 36px; }
        .asset-info { background: #fce4ec; border-radius: 8px; padding: 16px; margin-bottom: 24px; border-left: 4px solid #b71c1c; }
        .asset-info h3 { color: #b71c1c; margin-bottom: 8px; font-size: 1rem; }
        .asset-info p { color: #555; font-size: 0.9rem; margin-bottom: 4px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: #444; font-size: 0.9rem; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #cfd8dc; border-radius: 5px; font-size: 0.9rem; background: #fafafa; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #b71c1c; background: white; }
        textarea { resize: vertical; min-height: 100px; }
        .btn { display: inline-block; padding: 10px 22px; border-radius: 5px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600; text-decoration: none; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-danger   { background: #b71c1c; color: white; }
        .btn-secondary { background: #78909c; color: white; margin-left: 10px; }
        .footer { text-align: center; color: #90a4ae; font-size: 0.8rem; padding: 24px 0 40px; }
    </style>
</head>
<body>

<div class="navbar">
    <a class="brand" href="/assets">🖥️ IT Asset Management</a>
    <nav>
        <a href="/assets">Assets</a>
        <a href="/assets/add">Add Asset</a>
        <a href="/maintenance">Maintenance</a>
        <a href="/logs">Audit Log</a>
        <a href="/assets/warranty">Warranty</a>
    </nav>
</div>

<div class="page-wrapper">
    <div class="page-header">
        <h1>🔧 Raise Maintenance Request</h1>
    </div>

    <div class="card">

        <!-- Asset Info -->
        <div class="asset-info">
            <h3>⚠️ Asset to be Maintained</h3>
            <p><strong>Name:</strong> <span th:text="${asset.assetName}">Laptop</span></p>
            <p><strong>Type:</strong> <span th:text="${asset.assetType}">Laptop</span></p>
            <p><strong>Serial No:</strong> <span th:text="${asset.serialNumber}">SN001</span></p>
            <p><strong>Current Status:</strong> <span th:text="${asset.status}">Available</span></p>
        </div>

        <!-- Maintenance Request Form -->
        <form th:action="@{/maintenance/raise/{id}(id=${asset.id})}" method="post">
            <div class="form-group">
                <label for="raisedBy">Raised By (Your Name) *</label>
                <input type="text" id="raisedBy" name="raisedBy"
                       placeholder="Enter your name" required />
            </div>

            <div class="form-group">
                <label for="issueDescription">Issue Description *</label>
                <textarea id="issueDescription" name="issueDescription"
                          placeholder="Describe the problem in detail..." required></textarea>
            </div>

            <div style="margin-top: 10px;">
                <button type="submit" class="btn btn-danger">🚨 Submit Request</button>
                <a href="/assets" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<div class="footer">IT Asset Lifecycle Management System &mdash; Final Year Project</div>

</body>
</html>
