<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' | IT Asset Management'">IT Asset Management</title>
    <style>
        /* ===== RESET & BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background: #1a237e;
            color: white;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .navbar .brand {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-decoration: none;
            color: white;
        }

        .navbar nav a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
            padding: 6px 12px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .navbar nav a:hover {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        /* ===== PAGE WRAPPER ===== */
        .page-wrapper {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* ===== PAGE HEADER ===== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .page-header h1 {
            font-size: 1.6rem;
            color: #1a237e;
            font-weight: 700;
        }

        /* ===== CARDS ===== */
        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 28px;
            margin-bottom: 24px;
        }

        /* ===== TABLES ===== */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead th {
            background: #1a237e;
            color: white;
            padding: 12px 14px;
            text-align: left;
            font-weight: 600;
        }

        tbody tr {
            border-bottom: 1px solid #e8eaf0;
            transition: background 0.15s;
        }

        tbody tr:hover { background: #f5f6ff; }

        tbody td {
            padding: 11px 14px;
            vertical-align: middle;
        }

        /* ===== BADGES (status) ===== */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .badge-available   { background: #e8f5e9; color: #2e7d32; }
        .badge-assigned    { background: #e3f2fd; color: #1565c0; }
        .badge-maintenance { background: #fff3e0; color: #e65100; }
        .badge-retired     { background: #fce4ec; color: #b71c1c; }
        .badge-pending     { background: #fff8e1; color: #f57f17; }
        .badge-resolved    { background: #e8f5e9; color: #2e7d32; }
        .badge-inprogress  { background: #e3f2fd; color: #1565c0; }
        .badge-expired     { background: #fce4ec; color: #b71c1c; }
        .badge-expiring    { background: #fff3e0; color: #e65100; }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:hover { opacity: 0.88; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .btn-primary  { background: #1a237e; color: white; }
        .btn-success  { background: #2e7d32; color: white; }
        .btn-warning  { background: #f57c00; color: white; }
        .btn-danger   { background: #c62828; color: white; }
        .btn-info     { background: #0277bd; color: white; }
        .btn-sm       { padding: 5px 10px; font-size: 0.78rem; }

        /* ===== FORMS ===== */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #444;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cfd8dc;
            border-radius: 5px;
            font-size: 0.9rem;
            transition: border-color 0.2s;
            background: #fafafa;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1a237e;
            background: white;
        }

        /* ===== ALERT MESSAGES ===== */
        .alert {
            padding: 12px 18px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .alert-info    { background: #e3f2fd; color: #1565c0; border-left: 4px solid #1565c0; }
        .alert-warning { background: #fff3e0; color: #e65100; border-left: 4px solid #e65100; }
        .alert-danger  { background: #fce4ec; color: #b71c1c; border-left: 4px solid #b71c1c; }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: #90a4ae;
        }

        .empty-state p { font-size: 1rem; }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            color: #90a4ae;
            font-size: 0.8rem;
            padding: 24px 0 40px;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <a class="brand" href="/assets">🖥️ IT Asset Management</a>
    <nav>
        <a href="/assets">Assets</a>
        <a href="/assets/add">Add Asset</a>
        <a href="/maintenance">Maintenance</a>
        <a href="/logs">Audit Log</a>
        <a href="/assets/warranty">Warranty</a>
    </nav>
</div>
