<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Add New Asset | IT Asset Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
        .navbar { background: #1a237e; color: white; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .navbar .brand { font-size: 1.2rem; font-weight: 700; text-decoration: none; color: white; }
        .navbar nav a { color: rgba(255,255,255,0.85); text-decoration: none; margin-left: 20px; font-size: 0.9rem; padding: 6px 12px; border-radius: 4px; }
        .navbar nav a:hover { background: rgba(255,255,255,0.15); color: white; }
        .page-wrapper { max-width: 700px; margin: 30px auto; padding: 0 20px; }
        .page-header { margin-bottom: 24px; }
        .page-header h1 { font-size: 1.6rem; color: #1a237e; font-weight: 700; }
        .card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 36px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: #444; font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid #cfd8dc; border-radius: 5px; font-size: 0.9rem; background: #fafafa; transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #1a237e; background: white; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn { display: inline-block; padding: 10px 22px; border-radius: 5px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600; text-decoration: none; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #1a237e; color: white; }
        .btn-secondary { background: #78909c; color: white; margin-left: 10px; }
        .footer { text-align: center; color: #90a4ae; font-size: 0.8rem; padding: 24px 0 40px; }
        .hint { font-size: 0.78rem; color: #78909c; margin-top: 4px; }
    </style>
</head>
<body>

<div class="navbar">
    <a class="brand" href="/assets">🖥️ IT Asset Management</a>
    <nav>
        <a href="/assets">Assets</a>
        <a href="/assets/add">Add Asset</a>
        <a href="/maintenance">Maintenance</a>
        <a href="/logs">Audit Log</a>
        <a href="/assets/warranty">Warranty</a>
    </nav>
</div>

<div class="page-wrapper">
    <div class="page-header">
        <h1>➕ Add New Asset</h1>
    </div>

    <div class="card">
        <form th:action="@{/assets/add}" th:object="${asset}" method="post">

            <div class="form-row">
                <div class="form-group">
                    <label for="assetName">Asset Name *</label>
                    <input type="text" id="assetName" th:field="*{assetName}"
                           placeholder="e.g. Dell Latitude 5420" required />
                </div>
                <div class="form-group">
                    <label for="assetType">Asset Type *</label>
                    <select id="assetType" th:field="*{assetType}" required>
                        <option value="">-- Select Type --</option>
                        <option value="Laptop">Laptop</option>
                        <option value="Desktop">Desktop</option>
                        <option value="Monitor">Monitor</option>
                        <option value="Printer">Printer</option>
                        <option value="Server">Server</option>
                        <option value="Networking">Networking Device</option>
                        <option value="Phone">Phone / Mobile</option>
                        <option value="Tablet">Tablet</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="serialNumber">Serial Number *</label>
                <input type="text" id="serialNumber" th:field="*{serialNumber}"
                       placeholder="e.g. DL5420-2024-001" required />
                <div class="hint">Must be unique for each asset.</div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="purchaseDate">Purchase Date</label>
                    <input type="date" id="purchaseDate" th:field="*{purchaseDate}" />
                </div>
                <div class="form-group">
                    <label for="warrantyExpiryDate">Warranty Expiry Date</label>
                    <input type="date" id="warrantyExpiryDate" th:field="*{warrantyExpiryDate}" />
                </div>
            </div>

            <div style="margin-top: 10px;">
                <button type="submit" class="btn btn-primary">✅ Save Asset</button>
                <a href="/assets" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<div class="footer">IT Asset Lifecycle Management System &mdash; Final Year Project</div>

</body>
</html>
